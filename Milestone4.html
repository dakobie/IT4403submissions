<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieSearch — Milestone 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:      #2c1a0e;
      --surface: #3a2213;
      --card:    #4a2e1a;
      --border:  #ffffff12;
      --accent:  #d4956a;
      --accent2: #8b4513;
      --text:    #f5ede4;
      --muted:   #9e7d68;
      --radius:  6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: .4;
    }

    /* ── Header ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(to bottom, #2c1a0efa 80%, transparent);
      padding: 14px 32px;
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem; letter-spacing: 4px;
      color: var(--accent);
      text-shadow: 0 0 30px #d4956a55;
      flex-shrink: 0; cursor: default;
    }
    .logo span { color: var(--text); }

    .search-wrap { flex: 1; max-width: 480px; display: flex; gap: 0; }

    #search-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border); border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      color: var(--text); padding: 9px 14px;
      font-family: inherit; font-size: 14px; outline: none;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }

    /* ── Autocomplete dropdown ── */
    .search-wrap { position: relative; }
    #autocomplete-list {
      position: absolute; top: 100%; left: 0; right: 60px;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      z-index: 200;
      max-height: 260px; overflow-y: auto;
      display: none;
    }
    .autocomplete-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; cursor: pointer;
      transition: background .15s; font-size: 13px;
    }
    .autocomplete-item:hover { background: var(--surface); }
    .autocomplete-item img { width: 28px; height: 42px; object-fit: cover; border-radius: 2px; flex-shrink: 0; background: var(--surface); }
    .autocomplete-item .ac-title { flex: 1; font-weight: 500; }
    .autocomplete-item .ac-year { color: var(--muted); font-size: 11px; }

    #search-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 9px 20px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px;
      cursor: pointer; transition: background .2s, transform .1s; flex-shrink: 0;
    }
    #search-btn:hover { background: #e0aa85; }
    #search-btn:active { transform: scale(.97); }

    /* ── Nav tabs ── */
    .tabs { display: flex; gap: 2px; flex-shrink: 0; }

    .tab-btn {
      background: transparent; border: 1px solid transparent;
      color: var(--muted); padding: 7px 14px;
      font-family: 'Bebas Neue', sans-serif; font-size: .85rem; letter-spacing: 2px;
      cursor: pointer; border-radius: var(--radius); transition: all .2s;
    }
    .tab-btn:hover { color: var(--text); border-color: var(--border); }
    .tab-btn.active { color: var(--accent); border-color: var(--accent); background: #d4956a15; }

    /* ── View toggle + fav btn ── */
    .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

    .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); width: 32px; height: 32px;
      border-radius: var(--radius); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all .2s;
    }
    .view-btn:hover { border-color: var(--accent); color: var(--accent); }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

    #fav-tab-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 7px 14px;
      font-family: 'Bebas Neue', sans-serif; font-size: .85rem; letter-spacing: 2px;
      cursor: pointer; border-radius: var(--radius); transition: all .2s;
    }
    #fav-tab-btn:hover { color: #e74c3c; border-color: #e74c3c55; }
    #fav-tab-btn.active { color: #e74c3c; border-color: #e74c3c; background: #e74c3c12; }

    /* ── Layout ── */
    main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      min-height: calc(100vh - 68px);
    }

    .left-panel { padding: 28px 32px; border-right: 1px solid var(--border); }

    .section-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px;
    }
    .section-count { font-size: 12px; color: var(--muted); font-weight: 300; letter-spacing: 1px; }

    /* ── Grid View ── */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
      gap: 14px;
    }

    /* ── List View ── */
    .movies-list { display: flex; flex-direction: column; gap: 8px; }

    .list-card {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px;
      cursor: pointer; transition: border-color .2s, transform .15s;
    }
    .list-card:hover { border-color: var(--accent); transform: translateX(3px); }
    .list-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .list-card-poster {
      width: 44px; height: 66px; object-fit: cover;
      border-radius: 3px; flex-shrink: 0; background: var(--surface);
    }
    .list-card-no-poster {
      width: 44px; height: 66px; background: var(--surface);
      border-radius: 3px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 9px; text-align: center;
    }
    .list-card-info { flex: 1; min-width: 0; }
    .list-card-title { font-size: 13px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
    .list-card-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .list-card-overview {
      font-size: 11px; color: var(--muted); font-weight: 300; margin-top: 4px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .list-fav-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 16px; flex-shrink: 0; padding: 2px;
      transition: color .2s, transform .15s; align-self: center;
    }
    .list-fav-btn:hover { transform: scale(1.2); }
    .list-fav-btn.active { color: #e74c3c; }

    /* ── Grid card ── */
    .movie-card {
      cursor: pointer; border-radius: var(--radius); overflow: hidden;
      background: var(--card); border: 1px solid var(--border);
      transition: transform .2s, border-color .2s, box-shadow .2s;
      position: relative;
    }
    .movie-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 24px #d4956a14; }
    .movie-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }

    .card-fav-btn {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.6); border: none; border-radius: 50%;
      width: 28px; height: 28px; font-size: 13px;
      color: #fff; cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s;
    }
    .card-fav-btn:hover { background: rgba(0,0,0,.85); transform: scale(1.15); }
    .card-fav-btn.active { color: #e74c3c; }

    .card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--surface); }
    .card-no-poster {
      width: 100%; aspect-ratio: 2/3;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface); color: var(--muted); font-size: 11px; text-align: center; padding: 8px;
    }
    .card-body { padding: 8px 10px 10px; }
    .card-title { font-size: 12px; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-year { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ── Pagination ── */
    .pagination { display: flex; gap: 6px; margin-top: 24px; align-items: center; flex-wrap: wrap; }
    .page-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); width: 34px; height: 34px;
      border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }
    .page-btn:disabled { opacity: .3; cursor: default; }
    .page-info { font-size: 12px; color: var(--muted); margin-left: 6px; }

    /* ── Right panel ── */
    .right-panel {
      position: sticky; top: 68px;
      height: calc(100vh - 68px); overflow-y: auto;
      padding: 28px 24px; background: var(--surface);
    }

    .detail-empty {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--muted); text-align: center; opacity: .5;
    }
    .detail-empty .icon { font-size: 3rem; }
    .detail-empty p { font-size: 13px; font-weight: 300; }

    .detail-content { animation: fadeUp .3s ease; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    .detail-poster-wrap { position: relative; border-radius: var(--radius); overflow: hidden; margin-bottom: 18px; }
    .detail-poster { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .detail-poster-overlay { position: absolute; inset: 0; background: linear-gradient(to top, var(--surface) 0%, transparent 60%); }
    .detail-poster-title {
      position: absolute; bottom: 12px; left: 12px; right: 12px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px; line-height: 1.1;
      text-shadow: 0 2px 8px #0008;
    }
    .detail-no-poster {
      width: 100%; aspect-ratio: 16/9; background: var(--card);
      border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px; margin-bottom: 18px;
    }
    .detail-title-plain { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 14px; }
    .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .meta-chip {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 100px; padding: 3px 10px; font-size: 11px; color: var(--muted); font-weight: 300;
    }
    .meta-chip.rating { color: var(--accent); border-color: #d4956a44; background: #d4956a0d; }
    .detail-overview { font-size: 13px; font-weight: 300; line-height: 1.7; color: #e0cfc4; margin-top: 12px; }
    .genres-wrap { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
    .genre-tag {
      background: #d4956a12; border: 1px solid #d4956a33;
      color: var(--accent); border-radius: 3px; padding: 2px 8px; font-size: 11px; letter-spacing: .5px;
    }

    /* ── Detail fav button ── */
    .detail-fav-btn {
      margin-top: 16px; width: 100%;
      background: var(--card); border: 1px solid var(--border);
      color: var(--muted); padding: 9px 16px;
      border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .detail-fav-btn:hover { border-color: #e74c3c55; color: #e74c3c; }
    .detail-fav-btn.active { border-color: #e74c3c; color: #e74c3c; background: #e74c3c0d; }

    /* ── States ── */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; gap: 14px; color: var(--muted); }
    .spinner { width: 34px; height: 34px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #8b451318; border: 1px solid #8b451344; color: #c0673a; border-radius: var(--radius); padding: 12px 14px; font-size: 13px; }
    .empty-msg { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ffffff18; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ffffff28; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .right-panel { position: static; height: auto; border-top: 1px solid var(--border); }
      header { padding: 12px 16px; }
      .header-right { width: 100%; }
    }
    @media (max-width: 600px) {
      .tabs { order: 3; width: 100%; }
      .search-wrap { max-width: 100%; }
    }
  </style>

  <!-- MUSTACHE.JS TEMPLATES -->

  <!-- Template: Grid card -->
  <script id="tpl-grid-card" type="x-tmpl-mustache">
    <div class="movie-card" data-id="{{id}}">
      {{#poster}}
        <img class="card-poster" src="{{poster}}" alt="{{title}}" loading="lazy"/>
      {{/poster}}
      {{^poster}}
        <div class="card-no-poster">No Poster</div>
      {{/poster}}
      <button class="card-fav-btn {{favClass}}" data-id="{{id}}" title="Favorite">{{favIcon}}</button>
      <div class="card-body">
        <div class="card-title">{{title}}</div>
        <div class="card-year">{{year}}</div>
      </div>
    </div>
  </script>

  <!-- Template: List card -->
  <script id="tpl-list-card" type="x-tmpl-mustache">
    <div class="list-card" data-id="{{id}}">
      {{#poster}}
        <img class="list-card-poster" src="{{poster}}" alt="{{title}}" loading="lazy"/>
      {{/poster}}
      {{^poster}}
        <div class="list-card-no-poster">No Image</div>
      {{/poster}}
      <div class="list-card-info">
        <div class="list-card-title">{{title}}</div>
        <div class="list-card-meta">
          {{#year}}<span>{{year}}</span>{{/year}}
          {{#rating}}<span>⭐ {{rating}}</span>{{/rating}}
          {{#language}}<span>{{language}}</span>{{/language}}
        </div>
        {{#overview}}
          <div class="list-card-overview">{{overview}}</div>
        {{/overview}}
      </div>
      <button class="list-fav-btn {{favClass}}" data-id="{{id}}" title="Favorite">{{favIcon}}</button>
    </div>
  </script>

  <!-- Template: Detail panel -->
  <script id="tpl-detail" type="x-tmpl-mustache">
    <div class="detail-content">
      {{#imgSrc}}
        <div class="detail-poster-wrap">
          <img class="detail-poster" src="{{imgSrc}}" alt="{{title}}"/>
          <div class="detail-poster-overlay"></div>
          <div class="detail-poster-title">{{title}}</div>
        </div>
      {{/imgSrc}}
      {{^imgSrc}}
        <div class="detail-no-poster">No Image Available</div>
        <div class="detail-title-plain">{{title}}</div>
      {{/imgSrc}}
      <div class="detail-meta">
        {{#year}}<span class="meta-chip">{{year}}</span>{{/year}}
        {{#runtime}}<span class="meta-chip">{{runtime}}</span>{{/runtime}}
        {{#language}}<span class="meta-chip">{{language}}</span>{{/language}}
        {{#rating}}<span class="meta-chip rating">⭐ {{rating}}</span>{{/rating}}
      </div>
      {{#hasGenres}}
        <div class="genres-wrap">
          {{#genres}}
            <span class="genre-tag">{{name}}</span>
          {{/genres}}
        </div>
      {{/hasGenres}}
      <p class="detail-overview">{{overview}}</p>
      <button class="detail-fav-btn {{favClass}}" data-id="{{id}}"
        data-title="{{title}}" data-poster="{{poster}}"
        data-overview="{{overview}}" data-rating="{{rating}}"
        data-date="{{year}}">
        {{favIcon}} {{favLabel}}
      </button>
    </div>
  </script>

  <!-- Template: Favorites empty state -->
  <script id="tpl-fav-empty" type="x-tmpl-mustache">
    <div class="empty-msg">
      <div style="font-size:2rem;margin-bottom:10px">♡</div>
      <div>No favorites yet.</div>
      <div style="font-size:12px;margin-top:6px;color:var(--muted)">Click ♥ on any movie to save it here.</div>
    </div>
  </script>

</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">Movie<span>Search</span></div>

  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search movies…" autocomplete="off"/>
    <div id="autocomplete-list"></div>
    <button id="search-btn">Search</button>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="collection" data-cat="popular">🔥 Popular</button>
    <button class="tab-btn" data-tab="collection" data-cat="top_rated">⭐ Top Rated</button>
    <button class="tab-btn" data-tab="collection" data-cat="upcoming">🎬 Upcoming</button>
  </nav>

  <div class="header-right">
    <button id="fav-tab-btn">♥ Favorites</button>
    <div class="view-toggle">
      <button class="view-btn active" data-view="grid" title="Grid view">⊞</button>
      <button class="view-btn" data-view="list" title="List view">☰</button>
    </div>
  </div>
</header>

<main>
  <section class="left-panel">
    <div class="section-header">
      <h2 class="section-title" id="section-title">Popular Movies</h2>
      <span class="section-count" id="section-count"></span>
    </div>
    <div id="movies-container"></div>
    <div class="pagination" id="pagination"></div>
  </section>

  <aside class="right-panel" id="right-panel">
    <div class="detail-empty" id="detail-empty">
      <div class="icon">🎞</div>
      <p>Click any movie<br>to see details</p>
    </div>
    <div id="detail-content" style="display:none;"></div>
  </aside>
</main>

<script>
//configuration
const API_KEY = '4566b74db4c7b0ce5e233fa665e4ca17';
const BASE    = 'https://api.themoviedb.org/3';
const IMG     = 'https://image.tmdb.org/t/p/';

let state = {
  mode:      'collection',   // 'collection' | 'search' | 'favorites'
  category:  'popular',
  query:     '',
  allMovies: [],
  page:      1,
  perPage:   10,
  view:      'grid',         // 'grid' | 'list'
};

let acTimer = null;          // autocomplete debounce
let currentDetailId = null;  // track which movie is open in detail


// FAVORITES — localStorage

function getFavs() {
  try { return JSON.parse(localStorage.getItem('m4_favs') || '[]'); }
  catch(e) { return []; }
}
function saveFavs(arr) { localStorage.setItem('m4_favs', JSON.stringify(arr)); }
function isFav(id) { return getFavs().some(f => f.id === id); }
function toggleFav(movie) {
  let favs = getFavs();
  if (isFav(movie.id)) { favs = favs.filter(f => f.id !== movie.id); }
  else { favs.push(movie); }
  saveFavs(favs);
}


// HELPERS

function posterUrl(path, size) { return path ? `${IMG}${size || 'w300'}${path}` : null; }
function escHtml(str) { return $('<div>').text(str || '').html(); }
function showLoading() {
  $('#movies-container').html('<div class="loading-wrap"><div class="spinner"></div><span>Loading…</span></div>');
  $('#pagination').empty();
}
function showError(msg) { $('#movies-container').html(`<div class="error-msg">⚠ ${msg}</div>`); }

// Build view model for a movie object (used by both grid + list templates)
function movieViewModel(m) {
  const fav = isFav(m.id);
  return {
    id:       m.id,
    title:    m.title || 'Untitled',
    year:     m.release_date ? m.release_date.slice(0,4) : '',
    poster:   posterUrl(m.poster_path, 'w300'),
    overview: m.overview || '',
    rating:   m.vote_average ? m.vote_average.toFixed(1) : '',
    language: m.original_language ? m.original_language.toUpperCase() : '',
    favClass: fav ? 'active' : '',
    favIcon:  fav ? '♥' : '♡',
  };
}


// RENDER GRID / LIST  (Mustache templates)

function renderGrid() {
  const start = (state.page - 1) * state.perPage;
  const slice = state.allMovies.slice(start, start + state.perPage);

  if (!slice.length) {
    $('#movies-container').html('<div class="empty-msg">No results found.</div>');
    $('#pagination').empty();
    $('#section-count').text('');
    return;
  }

  const tplGrid = $('#tpl-grid-card').html();
  const tplList = $('#tpl-list-card').html();

  let html = '';

  if (state.view === 'grid') {
    const cards = slice.map(m => Mustache.render(tplGrid, movieViewModel(m))).join('');
    html = `<div class="movies-grid">${cards}</div>`;
  } else {
    const cards = slice.map(m => Mustache.render(tplList, movieViewModel(m))).join('');
    html = `<div class="movies-list">${cards}</div>`;
  }

  $('#movies-container').html(html);

  // Restore active state
  if (currentDetailId) {
    $(`[data-id="${currentDetailId}"]`).filter('.movie-card, .list-card').addClass('active');
  }

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(Math.min(state.allMovies.length, 50) / state.perPage);
  if (total <= 1) { $('#pagination').empty(); $('#section-count').text(`(${state.allMovies.length} movies)`); return; }

  let pag = `<button class="page-btn" data-page="${state.page - 1}" ${state.page <= 1 ? 'disabled' : ''}>‹</button>`;
  for (let i = 1; i <= total; i++) {
    pag += `<button class="page-btn ${i === state.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
  }
  pag += `<button class="page-btn" data-page="${state.page + 1}" ${state.page >= total ? 'disabled' : ''}>›</button>`;
  pag += `<span class="page-info">Page ${state.page} of ${total}</span>`;

  $('#pagination').html(pag);
  $('#section-count').text(`(${state.allMovies.length} movies · page ${state.page}/${total})`);
}


// FAVORITES VIEW

function renderFavorites() {
  state.mode = 'favorites';
  state.page = 1;
  clearDetail();
  $('#section-title').text('My Favorites');
  $('#pagination').empty();
  $('#section-count').text('');

  const favs = getFavs();
  if (!favs.length) {
    $('#movies-container').html(Mustache.render($('#tpl-fav-empty').html(), {}));
    return;
  }

  state.allMovies = favs;

  const tplGrid = $('#tpl-grid-card').html();
  const tplList = $('#tpl-list-card').html();
  let html = '';

  if (state.view === 'grid') {
    const cards = favs.map(m => Mustache.render(tplGrid, movieViewModel(m))).join('');
    html = `<div class="movies-grid">${cards}</div>`;
  } else {
    const cards = favs.map(m => Mustache.render(tplList, movieViewModel(m))).join('');
    html = `<div class="movies-list">${cards}</div>`;
  }

  $('#movies-container').html(html);
  $('#section-count').text(`(${favs.length} saved)`);
}


// COLLECTION FETCH

function loadCollection(cat) {
  state.mode = 'collection'; state.category = cat;
  state.page = 1; state.allMovies = [];
  currentDetailId = null;

  const labels = { popular: 'Popular Movies', top_rated: 'Top Rated Movies', upcoming: 'Upcoming Movies' };
  $('#section-title').text(labels[cat] || 'Movies');
  showLoading(); clearDetail();

  $.ajax({
    url: `${BASE}/movie/${cat}`,
    data: { api_key: API_KEY, page: 1 },
    dataType: 'json',
    success: function(data) {
      state.allMovies = data.results || [];
      renderGrid();
    },
    error: function(xhr) {
      showError('Failed to load movies: ' + xhr.status);
    }
  });
}


// SEARCH FETCH

function doSearch(query) {
  if (!query.trim()) return;
  state.mode = 'search'; state.query = query.trim();
  state.page = 1; state.allMovies = [];
  currentDetailId = null;

  $('#search-input').val(state.query);
  $('#autocomplete-list').hide().empty();
  $('#section-title').text(`Results: "${state.query}"`);
  showLoading(); clearDetail();
  $('.tab-btn').removeClass('active');
  $('#fav-tab-btn').removeClass('active');

  $.ajax({
    url: `${BASE}/search/movie`,
    data: { api_key: API_KEY, query: state.query, page: 1 },
    dataType: 'json',
    success: function(data) {
      state.allMovies = data.results || [];
      renderGrid();
    },
    error: function() {
      showError('Search failed.');
    }
  });
}

  $.when(...reqs).then(function(...responses) {
    let movies = [];
    responses.forEach(r => { const d = Array.isArray(r) ? r[0] : r; movies = movies.concat(d.results || []); });
    state.allMovies = movies.slice(0, 50);
    renderGrid();
  }).fail(function() { showError('Search failed. Check your API key or network.'); });



// AUTOCOMPLETE

function fetchSuggestions(query) {
  if (!query.trim() || query.length < 2) { $('#autocomplete-list').hide().empty(); return; }

  $.ajax({
    url: `${BASE}/search/movie`,
    data: { api_key: API_KEY, query: query, page: 1 },
    dataType: 'json',
    success: function(data) {
      const items = (data.results || []).slice(0, 6);
      if (!items.length) { $('#autocomplete-list').hide().empty(); return; }

      const html = items.map(m => {
        const img = m.poster_path
          ? `<img src="${IMG}w92${m.poster_path}" alt="">`
          : `<img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="" style="background:var(--card)">`;
        const year = m.release_date ? m.release_date.slice(0,4) : '';
        return `<div class="autocomplete-item" data-id="${m.id}" data-title="${escHtml(m.title)}">
          ${img}
          <span class="ac-title">${escHtml(m.title)}</span>
          ${year ? `<span class="ac-year">${year}</span>` : ''}
        </div>`;
      }).join('');

      $('#autocomplete-list').html(html).show();
    }
  });
}


// DETAIL PANEL (Mustache template)

function clearDetail() {
  currentDetailId = null;
  $('#detail-empty').show();
  $('#detail-content').hide().empty();
  $('.movie-card, .list-card').removeClass('active');
}

function showDetail(movieId) {
  currentDetailId = movieId;
  $.ajax({
    url: `${BASE}/movie/${movieId}`,
    data: { api_key: API_KEY },
    dataType: 'json',
    success: function(m) {
      const backdrop = m.backdrop_path ? posterUrl(m.backdrop_path, 'w780') : null;
      const poster   = m.poster_path   ? posterUrl(m.poster_path, 'w342') : null;
      const fav      = isFav(m.id);

      const vm = {
        id:       m.id,
        title:    m.title || 'Untitled',
        imgSrc:   backdrop || poster || '',
        poster:   poster || '',
        year:     m.release_date ? m.release_date.slice(0,4) : '',
        runtime:  m.runtime ? `${m.runtime} min` : '',
        language: m.original_language ? m.original_language.toUpperCase() : '',
        rating:   m.vote_average ? m.vote_average.toFixed(1) : '',
        overview: m.overview || 'No overview available.',
        genres:   m.genres || [],
        hasGenres: (m.genres || []).length > 0,
        favClass: fav ? 'active' : '',
        favIcon:  fav ? '♥' : '♡',
        favLabel: fav ? 'Favorited' : 'Add to Favorites',
      };

      const html = Mustache.render($('#tpl-detail').html(), vm);
      $('#detail-empty').hide();
      $('#detail-content').html(html).show();
      $('#right-panel').scrollTop(0);
    },
    error: function() {
      $('#detail-empty').hide();
      $('#detail-content').html('<div class="error-msg">⚠ Could not load details.</div>').show();
    }
  });
}


// EVENTS


// ── Click movie card (grid or list)
$(document).on('click', '.movie-card, .list-card', function(e) {
  if ($(e.target).hasClass('card-fav-btn') || $(e.target).hasClass('list-fav-btn')) return;
  $('.movie-card, .list-card').removeClass('active');
  $(this).addClass('active');
  showDetail(parseInt($(this).data('id')));
});

// ── Grid card heart
$(document).on('click', '.card-fav-btn', function(e) {
  e.stopPropagation();
  const id = parseInt($(this).data('id'));
  const m  = state.allMovies.find(x => x.id === id);
  if (!m) return;
  toggleFav(m);
  const now = isFav(id);
  $(this).html(now ? '♥' : '♡').toggleClass('active', now);
  // sync detail panel button if open
  if (currentDetailId === id) syncDetailFavBtn(id);
  // if in favorites view, re-render
  if (state.mode === 'favorites') renderFavorites();
});

// ── List card heart
$(document).on('click', '.list-fav-btn', function(e) {
  e.stopPropagation();
  const id = parseInt($(this).closest('[data-id]').data('id'));
  const m  = state.allMovies.find(x => x.id === id);
  if (!m) return;
  toggleFav(m);
  const now = isFav(id);
  $(this).html(now ? '♥' : '♡').toggleClass('active', now);
  if (currentDetailId === id) syncDetailFavBtn(id);
  if (state.mode === 'favorites') renderFavorites();
});

// ── Detail panel heart
$(document).on('click', '.detail-fav-btn', function() {
  const id = parseInt($(this).data('id'));
  const movie = {
    id,
    title:       $(this).data('title'),
    poster_path: $(this).data('poster'),
    overview:    $(this).data('overview'),
    vote_average: parseFloat($(this).data('rating')) || 0,
    release_date: $(this).data('date') ? $(this).data('date') + '-01-01' : '',
    original_language: ''
  };
  toggleFav(movie);
  const now = isFav(id);
  $(this).html(`${now ? '♥' : '♡'} ${now ? 'Favorited' : 'Add to Favorites'}`).toggleClass('active', now);
  // sync cards
  $(`.card-fav-btn[data-id="${id}"]`).html(now ? '♥' : '♡').toggleClass('active', now);
  $(`.list-fav-btn`).closest(`[data-id="${id}"]`).find('.list-fav-btn').html(now ? '♥' : '♡').toggleClass('active', now);
  if (state.mode === 'favorites') renderFavorites();
});

function syncDetailFavBtn(id) {
  const now = isFav(id);
  $('.detail-fav-btn').html(`${now ? '♥' : '♡'} ${now ? 'Favorited' : 'Add to Favorites'}`).toggleClass('active', now);
}

// ── Pagination
$(document).on('click', '.page-btn:not(:disabled)', function() {
  const p = parseInt($(this).data('page'));
  if (!p || p === state.page) return;
  state.page = p;
  renderGrid();
  $('.left-panel')[0].scrollTo({ top: 0, behavior: 'smooth' });
});

// ── Search
$('#search-btn').on('click', function() { doSearch($('#search-input').val()); });
$('#search-input').on('keydown', function(e) { if (e.key === 'Enter') doSearch($(this).val()); });

// Autocomplete — debounced input
$('#search-input').on('input', function() {
  clearTimeout(acTimer);
  const q = $(this).val();
  acTimer = setTimeout(() => fetchSuggestions(q), 280);
});

$(document).on('click', '.autocomplete-item', function() {
  const title = $(this).data('title');
  const id    = $(this).data('id');
  $('#autocomplete-list').hide().empty();
  $('#search-input').val(title);
  // show detail immediately + run search
  doSearch(title);
  showDetail(id);
});

// Close autocomplete on outside click
$(document).on('click', function(e) {
  if (!$(e.target).closest('.search-wrap').length) {
    $('#autocomplete-list').hide().empty();
  }
});

// ── Category tabs
$('.tab-btn').on('click', function() {
  $('.tab-btn').removeClass('active');
  $('#fav-tab-btn').removeClass('active');
  $(this).addClass('active');
  $('#search-input').val('');
  loadCollection($(this).data('cat'));
});

// ── Favorites tab
$('#fav-tab-btn').on('click', function() {
  $('.tab-btn').removeClass('active');
  $(this).toggleClass('active');
  if ($(this).hasClass('active')) {
    renderFavorites();
  } else {
    loadCollection(state.category || 'popular');
    $('.tab-btn[data-cat="' + (state.category || 'popular') + '"]').addClass('active');
  }
});

// ── View toggle (grid / list)
$('.view-btn').on('click', function() {
  const v = $(this).data('view');
  if (v === state.view) return;
  state.view = v;
  $('.view-btn').removeClass('active');
  $(this).addClass('active');
  if (state.mode === 'favorites') { renderFavorites(); }
  else { renderGrid(); }
});

// ── Boot
loadCollection('popular');
</script>
</body>
</html>
