<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>
        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .book {
            width: 150px;
            text-align: center;
        }

        .book img {
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
</nav>

<h1>Book Search</h1>

<input type="text" id="searchInput" placeholder="Search books...">
<button id="searchBtn">Search</button>

<br><br>

<label>Page:</label>
<select id="pageSelect"></select>

<div id="results"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
let currentQuery = "";
let resultsPerPage = 10;

$("#searchBtn").click(function () {
    currentQuery = $("#searchInput").val().trim();

    if (!currentQuery) {
        alert("Please enter a search term.");
        return;
    }

    loadPage(0);
    setupPagination();
});

function loadPage(page) {
    let startIndex = page * resultsPerPage;
    let url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(currentQuery)}&startIndex=${startIndex}&maxResults=${resultsPerPage}&key=AIzaSyDV80zZLdyOawgkP0t-bCAduJPe2wojnA0`;

    $("#results").html("<p>Loading...</p>");

    fetch(url)
        .then(function(res) {
            return res.json();
        })
        .then(function(data) {
            console.log("API response:", data);
            if (data.items && data.items.length > 0) {
                displayResults(data.items);
            } else {
                $("#results").html("<p>No results found. Try a different search.</p>");
            }
        })
        .catch(function(err) {
            console.error("Fetch error:", err);
            $("#results").html("<p style='color:red;'>Error loading books: " + err.message + "</p>");
        });
}

function displayResults(books) {
    $("#results").empty();

    books.forEach(function(book) {
        let info = book.volumeInfo;
        let title = info.title || "Unknown Title";

        // *** THE KEY FIX: force https:// on image URLs so Azure doesn't block them ***
        let img = (info.imageLinks && info.imageLinks.thumbnail)
            ? info.imageLinks.thumbnail.replace("http://", "https://")
            : "https://via.placeholder.com/128x195?text=No+Cover";

        let id = book.id;

        $("#results").append(`
            <div class="book">
                <img src="${img}" alt="${title}">
                <p><a href="details.html?id=${id}">${title}</a></p>
            </div>
        `);
    });
}

function setupPagination() {
    $("#pageSelect").empty();
    for (let i = 0; i < 6; i++) {
        $("#pageSelect").append(`<option value="${i}">Page ${i + 1}</option>`);
    }
}

$("#pageSelect").change(function () {
    let selectedPage = parseInt($(this).val());
    loadPage(selectedPage);
});
</script>

</body>
</html>
