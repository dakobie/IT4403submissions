<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5efe6;
            color: #3b1f0f;
        }

        nav {
            background-color: #5c3317;
            padding: 12px 24px;
        }

        nav a {
            color: #f5efe6;
            text-decoration: none;
            margin-right: 20px;
            font-size: 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
            color: #f0c080;
        }

        h1 {
            text-align: center;
            color: #5c3317;
            margin: 30px 0 20px;
            font-size: 28px;
        }

        .search-bar {
            text-align: center;
            margin-bottom: 16px;
        }

        #searchInput {
            padding: 8px 12px;
            width: 280px;
            border: 2px solid #a0522d;
            border-radius: 6px;
            font-size: 14px;
            background: #fff8f0;
            color: #3b1f0f;
            outline: none;
        }

        #searchInput:focus {
            border-color: #5c3317;
        }

        #searchBtn {
            padding: 8px 18px;
            background-color: #a0522d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 8px;
        }

        #searchBtn:hover {
            background-color: #5c3317;
        }

        .pagination {
            text-align: center;
            margin-bottom: 20px;
        }

        .pagination label {
            font-weight: bold;
            color: #5c3317;
            margin-right: 6px;
        }

        #pageSelect {
            padding: 6px 10px;
            border: 2px solid #a0522d;
            border-radius: 6px;
            background: #fff8f0;
            color: #3b1f0f;
            font-size: 14px;
            cursor: pointer;
        }

        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 10px 40px 40px;
            justify-content: center;
        }

        .book {
            width: 150px;
            text-align: center;
            background: #fff8f0;
            border: 1px solid #d4a97a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(92,51,23,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .book:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(92,51,23,0.2);
        }

        .book img {
            width: 100%;
            border-radius: 6px;
        }

        .book p {
            margin-top: 8px;
            font-size: 13px;
        }

        .book a {
            color: #5c3317;
            text-decoration: none;
            font-weight: bold;
        }

        .book a:hover {
            text-decoration: underline;
            color: #a0522d;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
</nav>

<h1>Book Search</h1>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search books...">
    <button id="searchBtn">Search</button>
</div>

<div class="pagination">
    <label>Page:</label>
    <select id="pageSelect"></select>
</div>

<div id="results"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
let currentQuery = "";
let resultsPerPage = 10;

$("#searchBtn").click(function () {
    currentQuery = $("#searchInput").val().trim();

    if (!currentQuery) {
        alert("Please enter a search term.");
        return;
    }

    loadPage(0);
    setupPagination();
});

function loadPage(page) {
    let startIndex = page * resultsPerPage;
    let url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(currentQuery)}&startIndex=${startIndex}&maxResults=${resultsPerPage}&key=AIzaSyDV80zZLdyOawgkP0t-bCAduJPe2wojnA0`;

    $("#results").html("<p style='text-align:center; color:#a0522d;'>Loading...</p>");

    fetch(url)
        .then(function(res) {
            return res.json();
        })
        .then(function(data) {
            console.log("API response:", data);
            if (data.items && data.items.length > 0) {
                displayResults(data.items);
            } else {
                $("#results").html("<p style='text-align:center;'>No results found. Try a different search.</p>");
            }
        })
        .catch(function(err) {
            console.error("Fetch error:", err);
            $("#results").html("<p style='color:red; text-align:center;'>Error loading books: " + err.message + "</p>");
        });
}

function displayResults(books) {
    $("#results").empty();

    books.forEach(function(book) {
        let info = book.volumeInfo;
        let title = info.title || "Unknown Title";

        let img = (info.imageLinks && info.imageLinks.thumbnail)
            ? info.imageLinks.thumbnail.replace("http://", "https://")
            : "https://via.placeholder.com/128x195?text=No+Cover";

        let id = book.id;

        $("#results").append(`
            <div class="book">
                <img src="${img}" alt="${title}">
                <p><a href="details.html?id=${id}">${title}</a></p>
            </div>
        `);
    });
}

function setupPagination() {
    $("#pageSelect").empty();
    for (let i = 0; i < 6; i++) {
        $("#pageSelect").append(`<option value="${i}">Page ${i + 1}</option>`);
    }
}

$("#pageSelect").change(function () {
    let selectedPage = parseInt($(this).val());
    loadPage(selectedPage);
});
</script>

</body>
</html>
