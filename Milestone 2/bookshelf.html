<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookshelf</title>

    <style>
        #bookshelf {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .book {
            width: 150px;
            text-align: center;
        }

        .book img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
</nav>

<h1>My Bookshelf</h1>

<div id="bookshelf"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
const bookIds = [
  "SR7HXy2XvBEC",
  "ULRJCgAAQBAJ",
  "etYGBgAAQBAJ",
  "7VmWBQAAQBAJ",
  "5m_XSPjasJQC"
];

bookIds.forEach(id => {
    let url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(currentQuery)}&startIndex=${startIndex}&maxResults=${resultsPerPage}&key=AIzaSyDV80zZLdyOawgkP0t-bCAduJPe2wojnA0`;

    $.getJSON(url, function (book) {
        let title = book.volumeInfo.title;
        let img = book.volumeInfo.imageLinks?.thumbnail
                  || "https://via.placeholder.com/128x195";

        $("#bookshelf").append(`
            <div class="book">
                <img src="${img}" alt="${title}">
                <p>
                    <a href="details.html?id=${id}">${title}</a>
                </p>
            </div>
        `);
    });
});
</script>

</body>
</html>
