<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookshelf</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5efe6;
            color: #3b1f0f;
        }

        nav {
            background-color: #5c3317;
            padding: 12px 24px;
        }

        nav a {
            color: #f5efe6;
            text-decoration: none;
            margin-right: 20px;
            font-size: 15px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
            color: #f0c080;
        }

        h1 {
            text-align: center;
            color: #5c3317;
            margin: 30px 0 20px;
            font-size: 28px;
        }

        #bookshelf {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 40px 40px;
            justify-content: center;
        }

        .book {
            width: 150px;
            text-align: center;
            background: #fff8f0;
            border: 1px solid #d4a97a;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 6px rgba(92,51,23,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .book:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(92,51,23,0.2);
        }

        .book img {
            width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .book p {
            margin-top: 8px;
            font-size: 13px;
        }

        .book a {
            color: #5c3317;
            text-decoration: none;
            font-weight: bold;
        }

        .book a:hover {
            text-decoration: underline;
            color: #a0522d;
        }

        #loading {
            text-align: center;
            color: #a0522d;
            font-size: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<nav>
    <a href="index.html">Home</a>
    <a href="bookshelf.html">My Bookshelf</a>
</nav>

<h1>My Bookshelf</h1>

<div id="bookshelf">
    <p id="loading">Loading bookshelf...</p>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
// Volume IDs from public Google Books bookshelf:
// https://books.google.com/books?uid=115385282140903618553&as_coll=1001
const bookIds = [
    "SR7HXy2XvBEC",
    "ULRJCgAAQBAJ",
    "etYGBgAAQBAJ",
    "7VmWBQAAQBAJ",
    "5m_XSPjasJQC"
];

let loaded = 0;

bookIds.forEach(function(id) {
    let url = `https://www.googleapis.com/books/v1/volumes/${id}?key=AIzaSyDV80zZLdyOawgkP0t-bCAduJPe2wojnA0`;

    fetch(url)
        .then(res => res.json())
        .then(function(book) {
            loaded++;
            if (loaded === 1) $("#loading").hide();

            if (book.error || !book.volumeInfo) return;

            let info = book.volumeInfo;
            let title = info.title || "Unknown Title";
            let img = (info.imageLinks && info.imageLinks.thumbnail)
                ? info.imageLinks.thumbnail.replace("http://", "https://")
                : "https://via.placeholder.com/128x195?text=No+Cover";

            $("#bookshelf").append(`
                <div class="book">
                    <img src="${img}" alt="${title}">
                    <p>
                        <a href="details.html?id=${id}">${title}</a>
                    </p>
                </div>
            `);
        })
        .catch(function(err) {
            console.error("Error loading book " + id + ":", err);
        });
});
</script>

</body>
</html>
